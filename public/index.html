<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgroMarket | Botswana's Local Harvest</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style> @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap'); body { font-family: 'Inter', sans-serif; } </style>
</head>
<body class="bg-gray-50 text-gray-800">

    <nav class="bg-white border-b border-gray-200 sticky top-0 z-50 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center gap-2">
                    <div class="bg-green-600 text-white p-2 rounded-lg"><i class="fa-solid fa-leaf"></i></div>
                    <span class="text-xl font-bold text-gray-900">AgroMarket</span>
                </div>
                <div id="nav-actions" class="flex items-center gap-4">
                    <a href="login.html" id="login-nav-btn" class="text-sm font-medium text-gray-600 hover:text-gray-900">Sign In</a>
                    <a href="sell.html" class="bg-gray-900 text-white px-4 py-2 rounded-lg text-sm font-medium hover:bg-gray-800 transition">Post a Listing</a>
                </div>
            </div>
        </div>
    </nav>

    <div class="bg-green-800 pb-12 sm:pb-24 pt-6 sm:pt-12 relative">
        <div class="absolute inset-0 bg-[url('https://images.unsplash.com/photo-1500937386664-56d1dfef4e78?auto=format&fit=crop&w=2000&q=20')] bg-cover bg-center opacity-20 mix-blend-overlay"></div>
        <div class="max-w-7xl mx-auto px-4 relative z-10 text-center">
            <h1 class="text-2xl sm:text-4xl font-bold text-white mb-1 sm:mb-2">Direct from local farms.</h1>
            <p class="text-green-100 text-xs sm:text-sm max-w-md mx-auto mb-3 sm:mb-6">Connect directly with Botswana's farmers. No middlemen.</p>
        </div>
    </div>

    <div class="max-w-4xl mx-auto px-4 -mt-6 sm:-mt-10 relative z-20 mb-6 sm:mb-12">
        <div class="bg-white rounded-xl shadow-md p-2 sm:p-3 flex flex-row gap-2 border border-gray-150">
            <input type="text" id="search-input" placeholder="Search..." class="flex-1 min-w-0 bg-gray-50 rounded-lg px-3 py-2 text-sm focus:outline-none border border-gray-200">
            <select id="location-select" class="hidden sm:block bg-gray-50 rounded-lg px-4 py-2 text-sm focus:outline-none border border-gray-200">
                <option value="all">All Locations</option>
                <option value="kanye">Kanye</option>
                <option value="ghanzi">Ghanzi</option>
                <option value="gaborone">Gaborone</option>
            </select>
            <button id="search-btn" class="bg-green-600 text-white rounded-lg px-4 sm:px-6 py-2 font-semibold text-sm hover:bg-green-700 transition shrink-0">
                <i class="fa-solid fa-magnifying-glass sm:hidden"></i>
                <span class="hidden sm:inline">Search</span>
            </button>
        </div>
        <select id="location-select-mobile" class="sm:hidden mt-2 w-full bg-white rounded-lg px-3 py-2 text-sm focus:outline-none border border-gray-200 shadow-md">
            <option value="all">All Locations</option>
            <option value="kanye">Kanye</option>
            <option value="ghanzi">Ghanzi</option>
            <option value="gaborone">Gaborone</option>
        </select>
    </div>

    <main class="max-w-7xl mx-auto px-4 pb-20">
        <div class="flex justify-between items-end mb-4 sm:mb-6">
            <h2 class="text-lg sm:text-xl font-bold text-gray-900">Live Marketplace</h2>
            <div id="results-count" class="text-xs font-medium text-gray-400">Syncing...</div>
        </div>
        <div id="listings-grid" class="grid grid-cols-2 sm:grid-cols-2 lg:grid-cols-4 gap-3 sm:gap-6"></div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const listingsGrid = document.getElementById('listings-grid');
            const resultsCount = document.getElementById('results-count');
            const searchInput = document.getElementById('search-input');
            const locationSelect = document.getElementById('location-select');
            const searchBtn = document.getElementById('search-btn');
            const navActions = document.getElementById('nav-actions');

            // Parse client session details
            const token = localStorage.getItem('agro_token');
            const profileStr = localStorage.getItem('user_profile');
            let loggedInUser = profileStr ? JSON.parse(profileStr) : null;

            // Simple active token check to see if we should adjust top navigation display layouts
            if (token && loggedInUser) {
                // Decode token manually to fetch userId safely
                const tokenPayload = JSON.parse(atob(token.split('.')[1]));
                loggedInUser.userId = tokenPayload.userId;

                navActions.innerHTML = `
                    <a href="profile.html" class="w-9 h-9 flex items-center justify-center rounded-full bg-gray-100 text-gray-700 hover:bg-gray-200 transition" title="My Profile">
                        <i class="fa-solid fa-user text-sm"></i>
                    </a>
                    <div class="text-right hidden sm:block">
                        <p class="text-xs font-bold text-gray-900">${loggedInUser.name}</p>
                        <button id="logout-btn" class="text-[11px] text-red-500 font-semibold hover:underline">Sign Out</button>
                    </div>
                    <button id="logout-btn-mobile" class="sm:hidden text-[11px] text-red-500 font-semibold">Sign Out</button>
                    <a href="sell.html" class="bg-green-600 text-white px-3 sm:px-4 py-2 rounded-lg text-sm font-medium hover:bg-green-700 transition">Post Product</a>
                `;
                
                document.getElementById('logout-btn')?.addEventListener('click', () => {
                    localStorage.clear();
                    window.location.reload();
                });

                document.getElementById('logout-btn-mobile')?.addEventListener('click', () => {
                    localStorage.clear();
                    window.location.reload();
                });
            }

            function fetchListings(searchTerm = '', locationTerm = 'all') {

                const url = `/api/listings?search=${encodeURIComponent(searchTerm)}&location=${encodeURIComponent(locationTerm)}`;

                fetch(url)
                    .then(res => res.json())
                    .then(payload => {
                        resultsCount.textContent = `${payload.length} item(s) available`;
                        renderListings(payload);
                    })
                    .catch(err => console.error("Error fetching listings:", err));
            }

            // Converts a date into a friendly "X ago" string for card badges
            function timeAgo(dateString) {
                if (!dateString) return '';
                const date = new Date(dateString);
                const seconds = Math.floor((new Date() - date) / 1000);

                const intervals = [
                    { label: 'y', secs: 31536000 },
                    { label: 'mo', secs: 2592000 },
                    { label: 'd', secs: 86400 },
                    { label: 'h', secs: 3600 },
                    { label: 'm', secs: 60 }
                ];

                for (const interval of intervals) {
                    const count = Math.floor(seconds / interval.secs);
                    if (count >= 1) return `${count}${interval.label} ago`;
                }
                return 'just now';
            }

            function renderListings(items) {
                listingsGrid.innerHTML = '';
                if(items.length === 0) {
                    listingsGrid.innerHTML = `<p class="col-span-full text-center text-gray-400 py-8">No matching entries.</p>`;
                    return;
                }

                items.forEach(item => {
                    const message = `Dumela! I saw your ${item.name} on AgroMarket. Still available?`;
                    const whatsappUrl = `https://wa.me/${item.phone}?text=${encodeURIComponent(message)}`;

                    // SECURITY CHECK: Show delete button ONLY if the card's userId matches the logged-in user's account ID
                    const isOwner = loggedInUser && item.userId === loggedInUser.userId;
                    const deleteBtnHtml = isOwner ? `
                        <button onclick="event.stopPropagation(); deleteListing('${item._id}')" class="w-9 h-9 bg-red-50 text-red-500 rounded-full hover:bg-red-500 hover:text-white flex items-center justify-center transition-colors">
                            <i class="fa-solid fa-trash-can text-xs"></i>
                        </button>
                    ` : '';

                    // Use first photo from the new images array if present, fall back to legacy single image field
                    const thumbnail = (item.images && item.images.length > 0) ? item.images[0] : item.image;
                    const postedBadge = item.createdAt ? `<span class="absolute top-2 right-2 bg-black/50 text-white text-[10px] font-medium px-2 py-0.5 rounded-full">${timeAgo(item.createdAt)}</span>` : '';

                    const cardHtml = `
                        <div onclick="window.location.href='listing.html?id=${item._id}'" class="bg-white rounded-xl overflow-hidden shadow-sm border border-gray-100 flex flex-col cursor-pointer hover:shadow-md transition-shadow">
                            <div class="h-44 overflow-hidden relative">
                                <span class="absolute top-2 left-2 bg-white/90 text-gray-800 text-[10px] font-bold px-2 py-0.5 rounded-full shadow-sm">${item.category}</span>
                                ${postedBadge}
                                <img src="${thumbnail}" alt="${item.name}" class="w-full h-full object-cover">
                            </div>
                            <div class="p-4 flex-1 flex flex-col">
                                <h3 class="font-bold text-gray-900 capitalize mb-0.5">${item.name}</h3>
                                <p class="text-xs text-gray-400 mb-3">${item.quantity} Available</p>
                                <div class="text-xs text-gray-600 mb-1"><i class="fa-solid fa-location-dot text-gray-400 mr-1.5"></i><span class="capitalize">${item.location}</span></div>
                                <div class="text-xs text-gray-600 mb-4"><i class="fa-solid fa-clock text-gray-400 mr-1.5"></i>${item.readyDate}</div>
                                <div class="mt-auto pt-3 border-t border-gray-50 flex items-center justify-between">
                                    <div><span class="text-lg font-bold text-gray-900">P${item.price}</span><span class="text-[10px] text-gray-400">/${item.unit}</span></div>
                                    <div class="flex gap-1.5">${deleteBtnHtml}${!isOwner ? `<a href="${whatsappUrl}" target="_blank" onclick="event.stopPropagation()" class="w-9 h-9 bg-green-50 text-green-600 rounded-full hover:bg-green-600 hover:text-white flex items-center justify-center transition-colors"><i class="fa-brands fa-whatsapp text-lg"></i></a>` : ''}</div>
                                </div>
                            </div>
                        </div>`;
                    listingsGrid.insertAdjacentHTML('beforeend', cardHtml);
                });
            }

            window.deleteListing = function(id) {
                if (confirm("Remove this post permanently?")) {
                    fetch(`/api/listings/${id}`, {
                        method: 'DELETE',
                        headers: { 'Authorization': `Bearer ${token}` } // Send JWT validation key
                    })
                    .then(res => res.json().then(data => ({ ok: res.ok, data })))
                    .then(({ ok, data }) => {
                        if (ok) fetchListings(searchInput.value, locationSelect.value);
                        else alert(data.error);
                    });
                }
            }

            searchBtn.addEventListener('click', () => fetchListings(searchInput.value, locationSelect.value));

            // Live search: fires automatically as you type, with a short debounce delay
            let searchDebounceTimer;
            searchInput.addEventListener('input', () => {
                clearTimeout(searchDebounceTimer);
                searchDebounceTimer = setTimeout(() => {
                    fetchListings(searchInput.value, locationSelect.value);
                }, 400); // waits 400ms after you stop typing before searching
            });

            // Also re-fetch instantly when the location dropdown changes
            locationSelect.addEventListener('change', () => {
                fetchListings(searchInput.value, locationSelect.value);
            });

            // Mobile location dropdown stays in sync with the desktop one
            const locationSelectMobile = document.getElementById('location-select-mobile');
            locationSelectMobile.addEventListener('change', () => {
                locationSelect.value = locationSelectMobile.value;
                fetchListings(searchInput.value, locationSelect.value);
            });

            fetchListings();
        });
    </script>
</body>
</html>
