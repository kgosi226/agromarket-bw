<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post a Listing | AgroMarket</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 min-h-screen flex flex-col justify-between">

    <!-- Navbar -->
    <nav class="bg-white border-b border-gray-200 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
            <a href="index.html" class="flex items-center gap-2 text-gray-900 font-bold text-xl">
                <div class="bg-green-600 text-white p-2 rounded-lg text-sm"><i class="fa-solid fa-leaf"></i></div>
                AgroMarket
            </a>
            <a href="index.html" class="text-sm font-medium text-gray-600 hover:text-gray-900"><i class="fa-solid fa-arrow-left mr-2"></i>Back to Market</a>
        </div>
    </nav>

    <!-- Form Section -->
    <main class="max-w-2xl mx-auto w-full px-4 py-12">
        <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-6 md:p-10">
            <h1 class="text-2xl font-bold text-gray-900 mb-2">List your harvest or livestock</h1>
            <p class="text-gray-500 text-sm mb-8">Fill in the product details below. Your registered WhatsApp phone number will be attached automatically.</p>

            <form id="listing-form" class="space-y-6">
                
                <!-- Category Grid Toggle -->
                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-2">What are you selling?</label>
                    <div class="grid grid-cols-2 gap-4">
                        <label class="border-2 border-gray-200 rounded-xl p-4 flex items-center gap-3 cursor-pointer hover:border-green-500 transition has-[:checked]:border-green-600 has-[:checked]:bg-green-50/50">
                            <input type="radio" name="category" value="Crops" checked class="accent-green-600 w-4 h-4">
                            <div>
                                <p class="font-semibold text-gray-900 text-sm">Crops / Veg</p>
                            </div>
                        </label>
                        <label class="border-2 border-gray-200 rounded-xl p-4 flex items-center gap-3 cursor-pointer hover:border-green-500 transition has-[:checked]:border-green-600 has-[:checked]:bg-green-50/50">
                            <input type="radio" name="category" value="Livestock" class="accent-green-600 w-4 h-4">
                            <div>
                                <p class="font-semibold text-gray-900 text-sm">Livestock</p>
                            </div>
                        </label>
                    </div>
                </div>

                <!-- Item Details Grid -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-2">Item Name</label>
                        <input type="text" id="name" required placeholder="e.g., Chobe Potatoes, Boer Goats" class="w-full border border-gray-300 rounded-xl px-4 py-3 bg-gray-50 focus:outline-none focus:ring-2 focus:ring-green-500 focus:bg-white transition">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-2">Location / Village</label>
                        <input type="text" id="location" required placeholder="e.g., Molepolole, Kanye" class="w-full border border-gray-300 rounded-xl px-4 py-3 bg-gray-50 focus:outline-none focus:ring-2 focus:ring-green-500 focus:bg-white transition">
                    </div>
                </div>

                <!-- Pricing & Quantity Grid -->
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div>
                        <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-2">Price (BWP)</label>
                        <input type="number" id="price" required placeholder="85" class="w-full border border-gray-300 rounded-xl px-4 py-3 bg-gray-50 focus:outline-none focus:ring-2 focus:ring-green-500 focus:bg-white transition">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-2">Unit Type</label>
                        <input type="text" id="unit" required placeholder="e.g., crate, bag, head" class="w-full border border-gray-300 rounded-xl px-4 py-3 bg-gray-50 focus:outline-none focus:ring-2 focus:ring-green-500 focus:bg-white transition">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-2">Total Quantity</label>
                        <input type="text" id="quantity" required placeholder="e.g., 50 Crates, 4 Head" class="w-full border border-gray-300 rounded-xl px-4 py-3 bg-gray-50 focus:outline-none focus:ring-2 focus:ring-green-500 focus:bg-white transition">
                    </div>
                </div>

                <!-- Timing Metadata -->
                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-2">Availability / Ready Date</label>
                    <input type="text" id="readyDate" placeholder="e.g., Ready Now, Next week Monday" class="w-full border border-gray-300 rounded-xl px-4 py-3 bg-gray-50 focus:outline-none focus:ring-2 focus:ring-green-500 focus:bg-white transition">
                </div>

                <!-- IMAGE UPLOAD ASSIST BLOCK -->
                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-2">Upload Photos (up to 4)</label>
                    <div id="upload-dropzone" class="w-full border-2 border-dashed border-gray-300 rounded-xl p-6 bg-gray-50 hover:bg-gray-100 transition relative flex flex-col items-center justify-center text-center">
                        <i class="fa-solid fa-cloud-arrow-up text-3xl text-gray-400 mb-2"></i>
                        <span class="text-sm font-medium text-gray-600 mb-1">Click to select up to 4 photos</span>
                        <span class="text-xs text-gray-400">Supports JPG, PNG or WEBP up to 5MB each</span>
                        <!-- The hidden native input that drives file picking -->
                        <input type="file" id="image-file" accept="image/*" multiple class="absolute inset-0 opacity-0 cursor-pointer">
                    </div>
                    <!-- Thumbnail previews of selected photos -->
                    <div id="photo-previews" class="grid grid-cols-4 gap-2 mt-3"></div>
                    <p id="file-chosen-name" class="text-xs font-semibold text-green-600 mt-2 hidden"></p>
                </div>

                <button type="submit" class="w-full bg-green-600 text-white font-semibold py-3.5 px-4 rounded-xl hover:bg-green-700 transition shadow-md shadow-green-600/10">
                    Publish Listing Live
                </button>
            </form>
        </div>
    </main>

    <footer class="bg-white border-t border-gray-200 text-center py-4 text-xs text-gray-400">
        &copy; 2026 AgroMarket BW.
    </footer>

    <script>
        // Security Verification Guard
        const token = localStorage.getItem('agro_token');
        if (!token) {
            alert('Please sign in or register an account before trying to publish listings!');
            window.location.href = 'login.html';
        }

        const MAX_PHOTOS = 4;
        const fileInput = document.getElementById('image-file');
        const fileLabel = document.getElementById('file-chosen-name');
        const previewsContainer = document.getElementById('photo-previews');

        // Holds the actual File objects the user has picked, across multiple selections
        let selectedFiles = [];

        function renderPreviews() {
            previewsContainer.innerHTML = '';
            selectedFiles.forEach((file, index) => {
                const url = URL.createObjectURL(file);
                const wrapper = document.createElement('div');
                wrapper.className = 'relative aspect-square rounded-lg overflow-hidden border border-gray-200 bg-gray-100';
                wrapper.innerHTML = `
                    <img src="${url}" class="w-full h-full object-cover">
                    <button type="button" data-index="${index}" class="remove-photo-btn absolute top-1 right-1 w-5 h-5 bg-black/60 text-white rounded-full text-xs flex items-center justify-center hover:bg-red-600 transition">
                        <i class="fa-solid fa-xmark"></i>
                    </button>
                `;
                previewsContainer.appendChild(wrapper);
            });

            // Wire up remove buttons
            previewsContainer.querySelectorAll('.remove-photo-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const idx = parseInt(btn.dataset.index, 10);
                    selectedFiles.splice(idx, 1);
                    renderPreviews();
                    updateLabel();
                });
            });
        }

        function updateLabel() {
            if (selectedFiles.length > 0) {
                fileLabel.textContent = `${selectedFiles.length} photo(s) selected`;
                fileLabel.classList.remove('hidden');
            } else {
                fileLabel.classList.add('hidden');
            }
        }

        // File Selection Handler — adds newly picked files, up to the max
        fileInput.addEventListener('change', function() {
            const newFiles = Array.from(this.files || []);
            const combined = [...selectedFiles, ...newFiles].slice(0, MAX_PHOTOS);

            if (selectedFiles.length + newFiles.length > MAX_PHOTOS) {
                alert(`You can upload up to ${MAX_PHOTOS} photos. Only the first ${MAX_PHOTOS} were kept.`);
            }

            selectedFiles = combined;
            renderPreviews();
            updateLabel();

            // Reset the native input so picking the same file again still fires 'change'
            this.value = '';
        });

        // Form Submit Handler
        document.getElementById('listing-form').addEventListener('submit', function(e) {
            e.preventDefault();

            // Construct Multipart Form Body to mix textual inputs and binary files cleanly
            const formData = new FormData();

            formData.append('category', document.querySelector('input[name="category"]:checked').value);
            formData.append('name', document.getElementById('name').value);
            formData.append('location', document.getElementById('location').value);
            formData.append('price', document.getElementById('price').value);
            formData.append('unit', document.getElementById('unit').value);
            formData.append('quantity', document.getElementById('quantity').value);
            formData.append('readyDate', document.getElementById('readyDate').value);

            // Append each selected photo under the 'images' field (matches upload.array('images', 4) on the server)
            selectedFiles.forEach(file => {
                formData.append('images', file);
            });

            fetch('/api/listings', {
                method: 'POST',
                headers: { 
                    'Authorization': `Bearer ${token}` 
                },
                body: formData
            })
            .then(res => res.json().then(data => ({ ok: res.ok, data })))
            .then(({ ok, data }) => {
                if (ok) {
                    alert('Listing successfully created under your profile!');
                    window.location.href = 'index.html';
                } else {
                    alert('Error: ' + data.error);
                }
            })
            .catch(err => {
                console.error(err);
                alert('Could not stream packet configurations to backend.');
            });
        });
    </script>
</body>
</html>
